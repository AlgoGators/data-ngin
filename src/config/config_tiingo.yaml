# Tiingo equities pipeline configuration.
# Structure mirrors config.yaml (the production Databento config) for consistency.

loader:
  class: "CSVLoader"
  module: "loader.csv_loader"
  file_path: "/opt/airflow/data_engine/contracts/contract_tiingo.csv"  # absolute container path
  # (matches config.yaml). Use "contracts/contract_tiingo.csv" if running locally from the repo root.

inserter:
  class: "TimescaleDBInserter"
  module: "inserter.timescaledb_inserter"

fetcher:
  class: "TiingoFetcher"
  module: "fetcher.tiingo_fetcher"

cleaner:
  class: "TiingoCleaner"
  module: "cleaner.tiingo_cleaner"

# Data provider configuration
provider:
  name: "tiingo"
  asset: "EQUITY"

# Database configuration (table created out-of-band; the inserter does not create it).
# db_name selects the target database (used by get_engine + TimescaleDBInserter) — keep
# equities in new_algo_data alongside corporate_action / the Sharadar tables. The futures
# pipelines keep their own db_name in config.yaml (algo_data) / new_config.yaml.
database:
  db_name: "new_algo_data"
  target_schema: "equities_data"
  raw_table: "equities_raw"
  table: "equities"

# Time range for data fetching, YYYY-MM-DD. Tiingo's endDate is INCLUSIVE.
# Incremental mode: blank start_date -> fetch only new days since the latest row in
# equities_data.equities; blank end_date -> up to yesterday. seed_start_date is used
# only on the very first run, when the table is empty.
time_range:
  start_date: ""
  end_date: ""
  seed_start_date: "2026-01-01"

# Options to handle missing data
missing_data:
  forward_fill: "False"
  backward_fill: "False"
  interpolate: "False"
  drop_nan: "True"
  zero_fill: "False"
  mean_fill: "False"
  median_fill: "False"
  custom_fill: "False"
  custom_value: "0"

# Logging options
logging:
  level: "INFO"

batch_downloading:
  batch: False
  unit: "Daily"
  max_units: 30
